name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read Pages configuration
        # Asks GitHub for the site's real URL, so the base path stays correct
        # if the repo is renamed or a custom domain is attached.
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build
        env:
          # "/<repo-name>" for a project page, "" once a custom domain serves
          # the site from the root — the trailing slash covers both.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}/

      - name: Add SPA fallback
        # GitHub Pages serves 404.html for unknown paths; serving the app
        # shell there lets deep links like /blog/some-post work.
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
