<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts are @import-ed from the bundled CSS (see src/index.css), so the
         browser only discovers fonts.googleapis.com after the CSS arrives —
         warming both origins up front cuts that chain by a round-trip. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Macs Dickinson — Engineering Director, Speaker</title>
    <meta
      name="description"
      content="Macs Dickinson — Engineering Director at LHV Bank. Talks, writing and podcasts on scaling engineering teams, org design for flow, and making AI useful in regulated environments."
    />
    <meta property="og:title" content="Macs Dickinson — Engineering Director, Speaker" />
    <meta
      property="og:description"
      content="Talks, writing and podcasts on scaling engineering teams, org design for flow, and making AI useful in regulated environments."
    />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
